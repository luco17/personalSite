- id: 29
  text: >-
    "[m]y problem was much worse: I was a perfectionist. Every test was a work of art, with custom
    photography, perfect copy, and every link thoroughly stress-tested before launch. Each test
    would take weeks to put together, only to fail. We needed to go faster, so we cut testing time
    to a week. Then a day. And eventually we were doing multiple tests a day. Things got sloppy.
    There were broken links, the wrong photography, and multiple typos and misspellings. But it
    didn’t make a difference. **If it was a bad idea, even a perfectly executed test wasn’t going to
    make it into a good idea**. But if it was a good idea, then customers immediately resonated with
    it, no matter how broken, difficult, or poorly executed the test was."
  attribution: Marc Randolph on idea velocity
